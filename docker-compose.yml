# ─────────────────────────────────────────────────────────────────────────────
# Personal AI Agent System — Podman / Docker Compose
#
# Services:
#   ollama        — Local LLM runtime (GPU-accelerated via NVIDIA)
#   qdrant        — Local vector database for agent memory
#
# Usage:
#   1. Copy .env.example → .env and fill in values
#   2. From repo root: docker compose --env-file .env up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
    ollama:
        image: ollama/ollama:latest
        ports:
            - '11434:11434'
        environment:
            - NVIDIA_VISIBLE_DEVICES=all
            - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
            # Limit threads so the host stays responsive; tune to taste
            - OLLAMA_NUM_THREADS=1
            # Keep models loaded for 5 minutes after the last request
            - OLLAMA_KEEP_ALIVE=5m
        volumes:
            # Shared model cache — host path so models survive container rebuilds.
            # Treat as read-only from the host; writes happen inside the container.
            - /home/${LINUX_USERNAME}/.ollama:/root/.ollama:z,rw
            # Container-specific temp / cache
            - ollama-data:/root/.ollama-data:rw,Z,rprivate
        restart: unless-stopped
        healthcheck:
            test: ['CMD-SHELL', 'nvidia-smi || exit 1']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        # Resource limits — adjust to your hardware (machine has 32 GB RAM / 16 cores)
        mem_limit: 16g
        shm_size: 8g
        cpus: '8.0'
        devices:
            - nvidia.com/gpu=all
        security_opt:
            - label=disable

    qdrant:
        image: qdrant/qdrant:latest
        ports:
            - '6333:6333'
        volumes:
            - qdrant-data:/qdrant/storage:Z
        restart: unless-stopped

volumes:
    ollama-data:
        driver: local
    qdrant-data:
        driver: local
