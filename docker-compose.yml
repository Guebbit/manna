# ─────────────────────────────────────────────────────────────────────────────
# Personal AI Agent System — Podman / Docker Compose
#
# Services:
#   ollama        — Local LLM runtime (GPU-accelerated via NVIDIA)
#   qdrant        — Local vector database for agent memory
#   manna         — Manna Express API (containerized apps/api server)
#
# Usage:
#   1. Copy .env.example → .env and fill in values
#   2. From repo root: docker compose --env-file .env up -d
#   3. Set MANNA_PORT in .env (default 3001) to change API host/container port
#   4. API will be available at http://localhost:${MANNA_PORT:-3001}
# ─────────────────────────────────────────────────────────────────────────────

services:
    ollama:
        # how long Podman waits before forcing shutdown with SIGKILL; adjust if you have very large models that need more time to unload
        # Default is SIGTERM which is graceful but may hang
        stop_signal: SIGKILL
        stop_grace_period: 5s
        image: ollama/ollama:latest
        ports:
            - '11434:11434'
        environment:
            - NVIDIA_VISIBLE_DEVICES=all
            - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
            # Limit threads so the host stays responsive; tune to taste
            - OLLAMA_NUM_THREADS=1
            # Keep models loaded for 5 minutes after the last request
            - OLLAMA_KEEP_ALIVE=5m
        volumes:
            # Shared model cache — host path so models survive container rebuilds.
            # Treat as read-only from the host; writes happen inside the container.
            - /home/${LINUX_USERNAME}/.ollama:/root/.ollama:z,rw
            # Container-specific temp / cache
            - ollama-data:/root/.ollama-data:rw,Z,rprivate
        restart: unless-stopped
        healthcheck:
            test: ['CMD-SHELL', 'nvidia-smi || exit 1']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        # Resource limits — adjust to your hardware (machine has 32 GB RAM / 16 cores)
        mem_limit: 16g
        shm_size: 8g
        cpus: '8.0'
        devices:
            - nvidia.com/gpu=all
        security_opt:
            - label=disable

    qdrant:
        image: qdrant/qdrant:latest
        ports:
            - '6333:6333'
        volumes:
            - qdrant-data:/qdrant/storage:Z
        restart: unless-stopped

    postgres:
        image: postgres:16-alpine
        ports:
            - '5432:5432'
        environment:
            POSTGRES_USER: ${MANNA_DB_USER:-manna}
            POSTGRES_PASSWORD: ${MANNA_DB_PASSWORD:-manna}
            POSTGRES_DB: ${MANNA_DB_NAME:-manna}
        volumes:
            - postgres-data:/var/lib/postgresql/data:Z
        restart: unless-stopped
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${MANNA_DB_USER:-manna} -d ${MANNA_DB_NAME:-manna}']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    neo4j:
        image: neo4j:5-community
        ports:
            # Neo4j Browser UI (HTTP)
            - '7474:7474'
            # Bolt protocol — used by the Manna neo4j-driver client
            - '7687:7687'
        environment:
            # Set initial credentials.  Must match NEO4J_USER / NEO4J_PASSWORD in .env.
            NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-put-your-password-here}
            # Disable unnecessary plugins for a lighter footprint.
            NEO4J_PLUGINS: '[]'
        volumes:
            - neo4j-data:/data:Z
        restart: unless-stopped
        healthcheck:
            test: ['CMD-SHELL', 'wget -qO- http://localhost:7474 || exit 1']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s

    manna:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - '${MANNA_PORT:-3001}:${MANNA_PORT:-3001}'
        env_file:
            - path: .env
              required: false
        volumes:
            - .:/app:Z
            - /app/node_modules
        environment:
            PORT: ${MANNA_PORT:-3001}
            MANNA_DB_HOST: postgres
            MANNA_DB_PORT: ${MANNA_DB_PORT:-5432}
            MANNA_DB_USER: ${MANNA_DB_USER:-manna}
            MANNA_DB_PASSWORD: ${MANNA_DB_PASSWORD:-manna}
            MANNA_DB_NAME: ${MANNA_DB_NAME:-manna}
            NEO4J_URI: bolt://neo4j:7687
            NEO4J_USER: ${NEO4J_USER:-neo4j}
            NEO4J_PASSWORD: ${NEO4J_PASSWORD:-put-your-password-here}
            OLLAMA_BASE_URL: http://ollama:11434
            QDRANT_URL: http://qdrant:6333
        depends_on:
            postgres:
                condition: service_healthy
            neo4j:
                condition: service_healthy
        restart: unless-stopped

volumes:
    ollama-data:
        driver: local
    qdrant-data:
        driver: local
    postgres-data:
        driver: local
    neo4j-data:
        driver: local
